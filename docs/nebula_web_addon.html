<style>
  #spotifyzone { border-top: 1px solid var(--line); margin-top: 12px; padding-top: 12px; }
  #spotifyzone .btn { width: 100%; border: 0; border-radius: 8px; padding: 10px;
    font: 600 12px ui-monospace, Menlo, monospace; letter-spacing: .08em; cursor: pointer; margin-bottom: 7px; }
  .btn.green { background: #1fdf64; color: #04240f; }
  .btn.ghost { background: rgba(150,170,220,.08); border: 1px solid var(--line) !important; color: var(--ink); }
  #spotifyzone input, #spotifyzone select { width: 100%; background: rgba(150,170,220,.06); border: 1px solid var(--line);
    color: var(--ink); border-radius: 8px; padding: 9px 10px; font-size: 12px; margin-bottom: 7px; }
  #spotifyzone select option { background: #10131f; }
  #sp-status { font-size: 10.5px; color: var(--faint); min-height: 14px; margin-top: 2px; }
  #sp-status.ok { color: #1fdf64; }
  #sp-setup summary { font-size: 10.5px; color: var(--faint); cursor: pointer; margin-bottom: 6px; }
  #sp-setup p { font-size: 10.5px; color: var(--faint); line-height: 1.5; margin: 0 0 6px; }
</style>
<script>
/* NEBULA Web — real Spotify export via Authorization Code + PKCE (no server). */
(function spotifyExport() {
  const zone = document.createElement("div");
  zone.id = "spotifyzone";
  document.getElementById("cratepanel").appendChild(zone);
  const REDIRECT = location.origin + location.pathname;
  const SCOPES = "playlist-read-private playlist-modify-private playlist-modify-public user-read-private user-read-email user-top-read user-library-read user-library-modify";
  const HARD_CID = "9f0f908cd188406ba5f458b8c6270b19";   // NEBULA's registered Spotify app
  const cid = () => HARD_CID || localStorage.getItem("nebula_spotify_cid") || "";

  /* ============ personalized galaxy: their Spotify, their stars ============ */
  const GENRE_BUCKET = g => {
    const s = (g || []).join(" ").toLowerCase();
    if (/rap|hip hop|trap|drill|grime/.test(s)) return 1;
    if (/r&b|soul|funk|neo/.test(s)) return 2;
    if (/pop/.test(s) && !/rock|indie|alt/.test(s)) return 3;
    return 0;
  };
  const hashRnd = (str, salt) => {
    let h = 7 + salt;
    for (const ch of str) h = (h * 31 + ch.charCodeAt(0)) | 0;
    return ((h >>> 3) % 1000) / 1000;
  };
  function focusStar(s) {
    openCard(s); s.flare = 2.2;
    cam.tYaw = Math.atan2(-s.x, -s.z) + Math.PI;
    cam.tPitch = Math.atan2(s.y, Math.hypot(s.x, s.z)) * 0.9;
    cam.tDist = 1.5;
  }
  const hintMsg = (m, on = true) => {
    const h = document.getElementById("hint");
    h.textContent = m; h.classList.toggle("on", on);
  };

  async function tasteProfile() {
    // Chain of sources, most direct first — any single blocked endpoint
    // degrades gracefully instead of killing the galaxy.
    try {
      const arts = (await api("/me/top/artists?limit=15&time_range=medium_term")).items || [];
      const trs = (await api("/me/top/tracks?limit=50&time_range=medium_term")).items || [];
      if (arts.length) return { artists: arts, tracks: trs, via: "your top artists" };
    } catch { hintMsg("top-artists blocked by Spotify — reading your Liked Songs instead…"); }
    const artistsFrom = async (tracks, via) => {
      const counts = {};
      for (const t of tracks) { const a = t?.artists?.[0]; if (a) { (counts[a.id] ??= { id: a.id, name: a.name, n: 0 }).n++; } }
      const top = Object.values(counts).sort((x, y) => y.n - x.n).slice(0, 15);
      if (!top.length) return null;
      let full = [];
      try { full = (await api(`/artists?ids=${top.map(a => a.id).join(",")}`)).artists || []; } catch {}
      const byId = new Map(full.filter(Boolean).map(a => [a.id, a]));
      return { artists: top.map(a => byId.get(a.id) || { id: a.id, name: a.name, genres: [] }), tracks, via };
    };
    try {
      const saved = [];
      for (let off = 0; off < 200; off += 50) {
        const r = await api(`/me/tracks?limit=50&offset=${off}`);
        saved.push(...(r.items || []).map(x => x.track).filter(Boolean));
        if (!r.next) break;
        await new Promise(r2 => setTimeout(r2, 60));
      }
      const p = await artistsFrom(saved, "your Liked Songs");
      if (p) return p;
    } catch { hintMsg("library blocked too — reading your playlists…"); }
    const me = await api("/me");
    const pls = ((await api("/me/playlists?limit=20")).items || []).filter(p => p && p.owner?.id === me.id).slice(0, 6);
    const plTracks = [];
    for (const pl of pls) {
      let r;
      try { r = await api(`/playlists/${pl.id}/tracks?limit=50`); }
      catch { r = await api(`/playlists/${pl.id}/items?limit=50`); }
      plTracks.push(...(r.items || []).map(x => x.track).filter(Boolean));
      await new Promise(r2 => setTimeout(r2, 60));
    }
    const p = await artistsFrom(plTracks, "your playlists");
    if (!p) throw new Error("no readable listening data on this account");
    return p;
  }

  async function buildUserGalaxy() {
    document.getElementById("dock").style.display = "none";   // no seed bar — it's automatic
    try {
      hintMsg("READING YOUR SPOTIFY — MAPPING YOUR GALAXY…");
      const prof = await tasteProfile();
      const topArtists = prof.artists;
      const knownIds = new Set(prof.tracks.map(t => t.id));
      const norm = s => s.toLowerCase().replace(/\s*[\(\[].*$/, "").replace(/\s*-\s*(live|remaster|acoustic|remix|sped|slowed).*$/i, "").trim();
      const knownNames = new Set(prof.tracks.map(t => norm(t.name)));

      // Deep cuts via /search per artist — a proven-working endpoint that
      // returns popularity directly (no album-crawl, no /tracks batch).
      hintMsg(`MINING THE CATALOGS OF ${topArtists.length} ARTISTS YOU LOVE…`);
      const byName = new Map();
      let fails = 0, calls = 0, firstErr = null;
      for (const [ai, artist] of topArtists.entries()) {
        // Live-probed against the migrated API: /search limit caps at 10 and
        // pages come back HALF-full — page in 10s, stop only on empty.
        for (let offset = 0; offset <= 110; offset += 10) {
          calls++;
          try {
            const q = encodeURIComponent(`artist:"${artist.name}"`);
            const r = await api(`/search?q=${q}&type=track&limit=10&offset=${offset}`);
            const items = r.tracks?.items || [];
            for (const t of items) {
              if (!t || t.artists?.[0]?.id !== artist.id) continue;
              if (knownIds.has(t.id) || knownNames.has(norm(t.name))) continue;
              const key = artist.id + "|" + norm(t.name);
              if (!byName.has(key)) byName.set(key, {
                id: t.id, name: t.name, artist, artistRank: ai,
                duration_ms: t.duration_ms, explicit: t.explicit, popularity: t.popularity ?? 50,
              });
            }
            if (items.length === 0) break;   // genuinely out of catalog
          } catch (e) { fails++; firstErr ??= e.message; }
          await new Promise(r2 => setTimeout(r2, 50));
        }
      }
      // Adaptive obscurity cutoff: prefer truly hidden, loosen only if thin.
      let all = [...byName.values()].sort((a, b) => a.popularity - b.popularity);
      let cap = 70, pool = all.filter(t => t.popularity <= cap);
      while (pool.length < 80 && cap < 96) { cap += 5; pool = all.filter(t => t.popularity <= cap); }
      const popById = new Map(pool.map(t => [t.id, t.popularity]));
      // Drop already-saved tracks (tolerant if the endpoint is blocked).
      const savedMask = [];
      for (let i = 0; i < pool.length; i += 50) {
        const ids = pool.slice(i, i + 50).map(t => t.id).join(",");
        try { savedMask.push(...await api(`/me/tracks/contains?ids=${ids}`)); }
        catch { savedMask.push(...pool.slice(i, i + 50).map(() => false)); }
      }
      pool = pool.filter((t, i) => !savedMask[i]).slice(0, 400);
      if (pool.length < 10) {
        hintMsg(fails ? `mining blocked (${fails}/${calls} calls failed): ${firstErr}` :
          `only ${pool.length} unknown tracks found across your artists — you really do know their catalogs`, true);
        return;
      }

      // Rebuild the star field: THEIR songs only.
      stars.length = 0;
      const vecs = [];
      pool.forEach((t, i) => {
        const obs = 1 - (popById.get(t.id) ?? 50) / 100;
        const th = t.artistRank * 2.399963 + (hashRnd(t.artist.id, 1) - 0.5) * 0.4;
        const ph = ((t.artistRank * 0.618) % 1 - 0.5) * 1.0 + (hashRnd(t.id, 2) - 0.5) * 0.3;
        const r = 0.30 + 0.70 * obs;
        const jx = (hashRnd(t.id, 3) - 0.5) * 0.16, jy = (hashRnd(t.id, 4) - 0.5) * 0.16, jz = (hashRnd(t.id, 5) - 0.5) * 0.16;
        stars.push({
          x: Math.cos(th) * Math.cos(ph) * r + jx, y: Math.sin(ph) * r * 0.8 + jy, z: Math.sin(th) * Math.cos(ph) * r + jz,
          g: GENRE_BUCKET(t.artist.genres), obs, title: t.name, artist: t.artist.name,
          i, tw: hashRnd(t.id, 6) * 6.28, flare: 0, gem: false, uri: "spotify:track:" + t.id,
          affinity: 1 / (1 + t.artistRank / 4),
        });
        const v = new Array(16).fill(0).map((_, d) => hashRnd(t.id, 10 + d) - 0.5);
        v[0] = Math.cos(th); v[1] = Math.sin(th); vecs.push(v);
      });
      DATA.cand_vecs = vecs;

      // Auto-rank: love-affinity × obscurity, max 2 per artist — no clicking needed.
      const ranked = [...stars].map(s => ({ s, score: s.affinity * (0.35 + 0.65 * s.obs) }))
        .sort((a, b) => b.score - a.score);
      const top = [], counts = {};
      for (const r of ranked) {
        const a = r.s.artist.toLowerCase();
        if ((counts[a] || 0) >= 2) continue; counts[a] = (counts[a] || 0) + 1;
        top.push(r); if (top.length === 10) break;
      }
      lastMatch = new Map(ranked.map((r, i) => [r.s.i, 1 - i / ranked.length]));
      let bx = 0, by = 0, bz = 0;
      for (const r of top) { r.s.gem = true; r.s.flare = 1.6; bx += r.s.x; by += r.s.y; bz += r.s.z; }
      beacon = { x: bx / top.length, y: by / top.length, z: bz / top.length };
      cam.tYaw = Math.atan2(-beacon.x, -beacon.z) + Math.PI;
      cam.tPitch = Math.atan2(beacon.y, Math.hypot(beacon.x, beacon.z)) * 0.9;
      cam.tDist = 1.6;

      // Right sidebar: their top 10 — click opens the song card directly.
      document.querySelector("#gems .h").textContent = "YOUR TOP 10 — SONGS YOU'LL LOVE";
      const list = document.getElementById("gemlist");
      list.innerHTML = top.map((r, i) => `
        <li data-i="${r.s.i}">
          <span class="rk mono">${String(i + 1).padStart(2, "0")}</span>
          <span><span class="t">${r.s.title}</span><span class="a">${r.s.artist}</span></span>
          <span class="m mono">${Math.round(r.s.obs * 100)}% hidden</span>
        </li>`).join("");
      list.querySelectorAll("li").forEach(li =>
        li.addEventListener("click", () => focusStar(stars[+li.dataset.i])));
      document.getElementById("gems").classList.add("show");
      sessionStorage.removeItem("nebula_reauth");
      hintMsg(`${stars.length} HIDDEN SONGS FROM ${topArtists.length} ARTISTS · TASTE READ FROM ${prof.via.toUpperCase()}`, true);
      setTimeout(() => hintMsg("", false), 9000);
    } catch (e) {
      // A 403 here means the cached token predates the top-artists/library
      // scopes — re-consent once, automatically.
      if (/403/.test(String(e.message)) && !sessionStorage.getItem("nebula_reauth")) {
        sessionStorage.setItem("nebula_reauth", "1");
        token = null; sessionStorage.removeItem("nebula_sp_token");
        hintMsg("NEBULA NEEDS UPDATED PERMISSIONS — SENDING YOU TO SPOTIFY…");
        setTimeout(login, 900);
        return;
      }
      hintMsg("couldn't read your Spotify: " + e.message, true);
    }
  }
  let token = sessionStorage.getItem("nebula_sp_token") || null;

  // Entry-point connect: a button on the landing itself, so linking happens
  // on the way in — and a returning OAuth redirect skips the landing entirely.
  function mountEntryButton() {
    const hero = document.querySelector("#landing .hero");
    if (!hero) return;
    const b = document.createElement("button");
    b.className = "ignite"; b.id = "sp-entry";
    b.style.cssText = "background:#1fdf64;color:#04240f;margin-left:10px";
    b.textContent = token ? "SPOTIFY CONNECTED ✓" : "⏻ CONNECT SPOTIFY";
    document.getElementById("ignite").after(b);
    b.onclick = () => {
      if (token) { document.getElementById("ignite").click(); return; }
      if (cid()) { login(); return; }
      document.getElementById("ignite").click();          // enter the galaxy…
      document.getElementById("cratepanel").classList.add("show");  // …and open setup
    };
  }
  function skipLandingIfConnected() {
    if (!token) return;
    const ig = document.getElementById("ignite");
    if (ig) setTimeout(() => ig.click(), 400);            // straight into the galaxy
    document.getElementById("cratepanel").classList.add("show");
  }

  function render() {
    // Once connected, the real export buttons replace the copy-paste fallback.
    const copyBtn = document.getElementById("cratecopy");
    if (copyBtn) {
      copyBtn.style.display = token ? "none" : "";
      if (copyBtn.nextElementSibling) copyBtn.nextElementSibling.style.display = token ? "none" : "";
    }
    if (!cid()) {
      zone.innerHTML = `
        <details id="sp-setup" open><summary>ONE-TIME SETUP — CONNECT A SPOTIFY APP</summary>
        <p>1 · Create an app at <b>developer.spotify.com/dashboard</b> (free).<br>
           2 · Add this exact Redirect URI: <b>${REDIRECT}</b><br>
           3 · Paste the app's Client ID below. It's public-safe and stored only in your browser.</p></details>
        <input id="sp-cid" placeholder="Spotify Client ID" autocomplete="off">
        <button class="btn ghost" id="sp-save">SAVE CLIENT ID</button>
        <div id="sp-status"></div>`;
      zone.querySelector("#sp-save").onclick = () => {
        const v = zone.querySelector("#sp-cid").value.trim();
        if (v) { localStorage.setItem("nebula_spotify_cid", v); render(); }
      };
    } else if (!token) {
      zone.innerHTML = `
        <button class="btn green" id="sp-connect">⏻ CONNECT SPOTIFY</button>
        <div id="sp-status">links your account so the crate can become a real playlist</div>`;
      zone.querySelector("#sp-connect").onclick = login;
    } else {
      zone.innerHTML = `
        <input id="sp-name" value="NEBULA finds" aria-label="new playlist name">
        <button class="btn green" id="sp-create">EXPORT CRATE → NEW PLAYLIST</button>
        <select id="sp-list" aria-label="choose an existing playlist"><option>loading your playlists…</option></select>
        <button class="btn ghost" id="sp-add">ADD CRATE TO SELECTED PLAYLIST</button>
        <div id="sp-status" class="ok">connected ✓</div>`;
      zone.querySelector("#sp-create").onclick = () => exportCrate(null, zone.querySelector("#sp-name").value || "NEBULA finds");
      zone.querySelector("#sp-add").onclick = () => exportCrate(zone.querySelector("#sp-list").value, null);
      loadPlaylists();
    }
  }
  const status = (m, ok) => { const el = zone.querySelector("#sp-status"); if (el) { el.textContent = m; el.classList.toggle("ok", !!ok); } };

  async function login(force) {
    const verifier = [...crypto.getRandomValues(new Uint8Array(48))].map(b => "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"[b % 62]).join("");
    sessionStorage.setItem("nebula_sp_verifier", verifier);
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
    const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    location.href = "https://accounts.spotify.com/authorize?" + new URLSearchParams({
      client_id: cid(), response_type: "code", redirect_uri: REDIRECT,
      scope: SCOPES, code_challenge_method: "S256", code_challenge: challenge,
      ...(force ? { show_dialog: "true" } : {}),
    });
  }
  async function handleCallback() {
    const code = new URLSearchParams(location.search).get("code");
    if (!code) return;
    history.replaceState({}, "", REDIRECT);
    const r = await fetch("https://accounts.spotify.com/api/token", {
      method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        grant_type: "authorization_code", code, redirect_uri: REDIRECT,
        client_id: cid(), code_verifier: sessionStorage.getItem("nebula_sp_verifier") || "",
      }),
    }).then(r => r.json());
    if (r.access_token) { token = r.access_token; sessionStorage.setItem("nebula_sp_token", token); }
  }
  async function api(path, opts = {}) {
    const r = await fetch("https://api.spotify.com/v1" + path, {
      ...opts, headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", ...(opts.headers || {}) },
    });
    if (r.status === 401) { token = null; sessionStorage.removeItem("nebula_sp_token"); render(); throw new Error("session expired — reconnect"); }
    if (r.status === 204) return {};
    const body = await r.json().catch(() => ({}));
    if (!r.ok) {
      let m = `${r.status}: ${body.error?.message || "unknown error"}`;
      if (r.status === 403) m += " — if this account didn't create the Spotify app, add its email under User Management in the app's dashboard settings, then RECONNECT";
      throw new Error(m);
    }
    return body;
  }
  async function loadPlaylists() {
    try {
      const me = await api("/me"); zone.dataset.uid = me.id;
      status(`connected ✓ as ${me.display_name || me.id}${me.email ? " · " + me.email : ""} — this exact email must be in the app's User Management`, true);
      const pl = await api("/me/playlists?limit=50");
      const sel = zone.querySelector("#sp-list");
      const mine = (pl.items || []).filter(p => p && p.owner && p.owner.id === me.id);
      sel.innerHTML = mine.map(p =>
        `<option value="${p.id}">${p.name}${p.tracks?.total != null ? ` (${p.tracks.total})` : ""}</option>`
      ).join("") || "<option value=''>no editable playlists</option>";
    } catch (e) { status("couldn't load playlists: " + e.message); }
  }
  async function exportCrate(playlistId, newName) {
    if (!crate.length) { status("crate is empty — click stars and + Crate first"); return; }
    try {
      status("finding your tracks on Spotify…");
      const uris = [];
      for (const c of crate) {
        const st = typeof stars !== "undefined" && stars[c.i];
        if (st && st.uri && st.title === c.title) { uris.push(st.uri); continue; }
        const cleanTitle = c.title.replace(/\s*[\(\[](feat|ft|with|from)\.?[^\)\]]*[\)\]]/gi, "").trim();
        const q = encodeURIComponent(`track:"${cleanTitle}" artist:"${c.artist.split(",")[0]}"`);
        const r = await api(`/search?q=${q}&type=track&limit=1`);
        const hit = r.tracks?.items?.[0];
        if (hit) uris.push(hit.uri);
        await new Promise(res => setTimeout(res, 120));
      }
      if (!uris.length) { status("couldn't match any tracks on Spotify"); return; }
      let playlistUrl = null;
      if (!playlistId) {
        // Spotify's Feb 2026 migration: POST /users/{id}/playlists is gone
        // for dev-mode apps — /me/playlists is the replacement.
        const p = await api(`/me/playlists`, {
          method: "POST", body: JSON.stringify({ name: newName, public: false, description: "Hidden gems found in NEBULA — taste-embedding × obscurity." }),
        });
        if (!p.id) throw new Error("playlist create returned no id");
        playlistId = p.id; playlistUrl = p.external_urls?.spotify;
      } else {
        playlistUrl = "https://open.spotify.com/playlist/" + playlistId;
      }
      // Same migration renamed /tracks to /items; fall back for older apps.
      try {
        await api(`/playlists/${playlistId}/items`, { method: "POST", body: JSON.stringify({ uris }) });
      } catch {
        await api(`/playlists/${playlistId}/tracks`, { method: "POST", body: JSON.stringify({ uris }) });
      }
      const el = zone.querySelector("#sp-status");
      if (el) el.innerHTML = `exported ${uris.length}/${crate.length} tracks ✓ — <a href="${playlistUrl}" target="_blank" rel="noopener" style="color:#1fdf64">OPEN PLAYLIST ↗</a>`;
      loadPlaylists();
    } catch (e) { status("export failed: " + e.message); }
  }
  // ♥ on the card also saves/removes the song in their real Spotify library.
  document.getElementById("c-like").addEventListener("click", () => {
    if (!token || typeof cardStar === "undefined" || !cardStar?.uri) return;
    const id = cardStar.uri.split(":").pop();
    api(`/me/tracks?ids=${id}`, { method: likes.has(cardStar.i) ? "PUT" : "DELETE" }).catch(() => {});
  });

  // ?probe=1 — live endpoint diagnostics through the app's own api() helper.
  async function probeSearch() {
    const tests = ["limit=25&offset=0", "limit=20", "limit=10", "limit=5", "limit=1", "", "limit=25&offset=50", "limit=10&offset=100"];
    const out = [];
    for (const t of tests) {
      try {
        const r = await api(`/search?q=${encodeURIComponent('artist:"Drake"')}&type=track${t ? "&" + t : ""}`);
        out.push(`[${t || "none"}] OK n=${r.tracks?.items?.length ?? "?"}`);
      } catch (e) { out.push(`[${t || "none"}] ${e.message.slice(0, 30)}`); }
      await new Promise(r2 => setTimeout(r2, 100));
    }
    console.log("NEBULA PROBE\n" + out.join("\n"));
    hintMsg("PROBE " + out.join("  ·  "), true);
  }

  handleCallback().then(() => {
    render(); mountEntryButton(); skipLandingIfConnected();
    if (token && new URLSearchParams(location.search).get("probe")) { probeSearch(); return; }
    if (token) buildUserGalaxy();
  });
})();
</script>
